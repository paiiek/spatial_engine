[pytest]
addopts = --import-mode=importlib
markers =
    soak: opt-in long-running soak tests (ADR 0019 PR6 60 s shm cross-process run)
    adm_player_full: Option B full `python -m adm_player` + BWF producer (deferred to PR7)
pythonpath = . ui ui/webgui bridge
testpaths = tests bridge/tests ui/tests ui/webgui/tests
norecursedirs =
    .git
    .venv
    build*
    core/build*
    build-test*
    *_deps
    node_modules
    __pycache__
