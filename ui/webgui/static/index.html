<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>spatial_engine WebGUI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #ccc;
      font-family: "SF Mono", "Fira Code", monospace;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4e;
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; font-weight: 600; color: #a0a0cc; }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #e74c3c;
      transition: background 0.3s;
    }
    #status-dot.connected { background: #2ecc71; }
    #status-label { font-size: 11px; color: #666; }

    /* Mode panel */
    #mode-panel {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    #mode-panel button {
      font-family: inherit;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid #2a2a4e;
      background: #1a1a2e;
      color: #888;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    #mode-panel button.active {
      background: #2a2a6e;
      color: #a0c0ff;
      border-color: #4a4aae;
    }
    #mode-status { font-size: 11px; color: #666; }

    main {
      display: flex;
      flex: 1;
      gap: 8px;
      padding: 8px;
      overflow: hidden;
    }

    .view-panel {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .view-label {
      font-size: 10px;
      color: #555;
      padding: 4px 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    #topdown-panel { flex: 3; }
    #elevation-panel { flex: 1; }

    canvas {
      flex: 1;
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    /* Legend */
    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 8px;
      background: #16162a;
      border-top: 1px solid #2a2a4e;
      flex-shrink: 0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: #888;
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
  </style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>spatial_engine WebGUI</h1>
  <span id="status-label">connecting…</span>
  <div id="mode-panel">
    <button id="btn-ai-mode" class="active">AI 추적</button>
    <button id="btn-lt-mode">저레이턴시</button>
    <span id="mode-status">모드: ai</span>
    <div id="v2s-panel" style="display:inline-flex;align-items:center;gap:6px;margin-left:12px;border-left:1px solid #333;padding-left:12px;">
      <span style="font-size:11px;color:#aaa;">vid2spatial</span>
      <button id="btn-v2s-start">시작</button>
      <button id="btn-v2s-stop" disabled>정지</button>
      <span id="v2s-status" style="font-size:11px;color:#666;">정지됨</span>
    </div>
  </div>
  <div id="scene-panel" style="display:flex;align-items:center;gap:6px;margin-left:12px;">
    <input id="scene-name" type="text" value="default" style="width:90px;font-family:inherit;font-size:11px;padding:3px 6px;background:#1a1a2e;border:1px solid #2a2a4e;border-radius:4px;color:#ccc;" placeholder="씬 이름" />
    <button id="btn-scene-save" style="font-family:inherit;font-size:11px;padding:4px 8px;border-radius:4px;border:1px solid #2a2a4e;background:#1a1a2e;color:#888;cursor:pointer;">저장</button>
    <button id="btn-scene-load" style="font-family:inherit;font-size:11px;padding:4px 8px;border-radius:4px;border:1px solid #2a2a4e;background:#1a1a2e;color:#888;cursor:pointer;">로드</button>
  </div>
  <span id="fps-counter" title="Canvas render rate (Phase 1 gate: ≥ 60 fps)" style="margin-left:12px;font-family:inherit;font-size:11px;color:#5cf;background:#1a1a2e;border:1px solid #2a2a4e;border-radius:4px;padding:3px 6px;">— fps</span>
</header>

<main>
  <div class="view-panel" id="topdown-panel">
    <div class="view-label">Top-Down View</div>
    <canvas id="topdown-canvas"></canvas>
  </div>
  <div style="display:flex;flex-direction:column;flex:1;gap:8px;">
    <div class="view-panel" id="elevation-panel" style="flex:1;">
      <div class="view-label">Elevation View</div>
      <canvas id="elevation-canvas"></canvas>
    </div>
    <div id="legend">
      <!-- Populated by JS -->
    </div>
  </div>
</main>

<script src="/static/ws_client.js"></script>
<script src="/static/canvas.js"></script>
<script>
  // Status dot reflects WS connection
  const dot = document.getElementById("status-dot");
  const label = document.getElementById("status-label");

  // Patch WsClient to update UI
  const _origOnMessage = WsClient.onMessage.bind(WsClient);
  // We hook into ws readyState via polling (light-weight for MVP)
  setInterval(() => {
    // Access internal ws by re-exposing via WsClient
    const connected = document.visibilityState !== "hidden";
    // Try a lightweight ping: if we received a message recently, show connected
  }, 1000);

  // Build legend
  const legendEl = document.getElementById("legend");
  const GROUP_LABELS = ["G1","G2","G3","G4","G5","G6","G7","G8"];
  const GROUP_COLORS_HTML = [
    "#e74c3c","#e67e22","#f1c40f","#2ecc71",
    "#1abc9c","#3498db","#9b59b6","#e91e63",
  ];
  GROUP_LABELS.forEach((lbl, i) => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `<span class="legend-dot" style="background:${GROUP_COLORS_HTML[i]}"></span>${lbl} (${i*8+1}-${i*8+8})`;
    legendEl.appendChild(item);
  });

  // Update status dot based on WS state by monkey-patching WsClient.onMessage
  // Note: WsClient already parses JSON; data is an object here.
  WsClient.onMessage((data) => {
    dot.classList.add("connected");
    label.textContent = "connected";
    // Handle mode_change broadcast from server
    if (data && data.type === "mode_change") {
      _applyMode(data.mode);
    } else if (data && data.type === "v2s_status") {
      _v2sSetRunning(data.running);
    }
  });

  // --- Mode toggle ---
  const btnAi = document.getElementById("btn-ai-mode");
  const btnLt = document.getElementById("btn-lt-mode");
  const modeStatus = document.getElementById("mode-status");

  function _applyMode(mode) {
    modeStatus.textContent = "모드: " + mode;
    if (mode === "ai") {
      btnAi.classList.add("active");
      btnLt.classList.remove("active");
    } else {
      btnLt.classList.add("active");
      btnAi.classList.remove("active");
    }
  }

  async function _setMode(mode) {
    try {
      const res = await fetch("/api/mode?mode=" + encodeURIComponent(mode), { method: "POST" });
      if (res.ok) {
        const json = await res.json();
        _applyMode(json.mode);
      }
    } catch (err) {
      console.error("[mode] request failed:", err);
    }
  }

  btnAi.addEventListener("click", () => _setMode("ai"));
  btnLt.addEventListener("click", () => _setMode("low_latency"));

  // Fetch initial mode on load
  fetch("/api/mode").then(r => r.json()).then(j => _applyMode(j.mode)).catch(() => {});

  // vid2spatial bridge controls
  const btnV2sStart = document.getElementById("btn-v2s-start");
  const btnV2sStop  = document.getElementById("btn-v2s-stop");
  const v2sStatus   = document.getElementById("v2s-status");

  async function _v2sSetRunning(running) {
    v2sStatus.textContent = running ? "실행 중 (:9000)" : "정지됨";
    v2sStatus.style.color = running ? "#4caf50" : "#666";
    btnV2sStart.disabled = running;
    btnV2sStop.disabled  = !running;
  }

  btnV2sStart.addEventListener("click", async () => {
    try {
      const r = await fetch("/api/vid2spatial/start", { method: "POST" });
      const j = await r.json();
      _v2sSetRunning(j.running);
    } catch(e) { console.error("[v2s] start failed:", e); }
  });

  btnV2sStop.addEventListener("click", async () => {
    try {
      const r = await fetch("/api/vid2spatial/stop", { method: "POST" });
      const j = await r.json();
      _v2sSetRunning(j.running);
    } catch(e) { console.error("[v2s] stop failed:", e); }
  });

  // Poll initial status
  fetch("/api/vid2spatial/status").then(r => r.json()).then(j => _v2sSetRunning(j.running)).catch(()=>{});

  // --- Scene save/load ---
  document.getElementById("btn-scene-save").addEventListener("click", () => {
    const name = document.getElementById("scene-name").value.trim() || "default";
    WsClient.send({ type: "scene_save", name });
  });
  document.getElementById("btn-scene-load").addEventListener("click", () => {
    const name = document.getElementById("scene-name").value.trim() || "default";
    WsClient.send({ type: "scene_load", name });
  });
</script>
</body>
</html>
