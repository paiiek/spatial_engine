<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>spatial_engine WebGUI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #ccc;
      font-family: "SF Mono", "Fira Code", monospace;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4e;
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; font-weight: 600; color: #a0a0cc; }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #e74c3c;
      transition: background 0.3s;
    }
    #status-dot.connected { background: #2ecc71; }
    #status-label { font-size: 11px; color: #666; }

    /* Mode panel */
    #mode-panel {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    #mode-panel button {
      font-family: inherit;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid #2a2a4e;
      background: #1a1a2e;
      color: #888;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    #mode-panel button.active {
      background: #2a2a6e;
      color: #a0c0ff;
      border-color: #4a4aae;
    }
    #mode-status { font-size: 11px; color: #666; }

    main {
      display: flex;
      flex: 1;
      gap: 8px;
      padding: 8px;
      overflow: hidden;
    }

    .view-panel {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .view-label {
      font-size: 10px;
      color: #555;
      padding: 4px 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    #topdown-panel { flex: 3; }
    #elevation-panel { flex: 1; }

    canvas {
      flex: 1;
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    /* Legend */
    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 8px;
      background: #16162a;
      border-top: 1px solid #2a2a4e;
      flex-shrink: 0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: #888;
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    /* Trajectory panel */
    #trajectory-panel {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      padding: 10px 12px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
    }
    #trajectory-panel h2 {
      font-size: 11px;
      color: #a0a0cc;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .traj-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .traj-label {
      color: #888;
      min-width: 88px;
    }
    .traj-val {
      color: #aef;
      min-width: 40px;
      text-align: right;
    }
    #trajectory-panel input[type=range] {
      flex: 1;
      accent-color: #4a8aff;
    }
    #trajectory-panel select,
    #trajectory-panel input[type=number] {
      font-family: inherit;
      font-size: 11px;
      background: #0f0f1a;
      border: 1px solid #2a2a4e;
      border-radius: 4px;
      color: #ccc;
      padding: 2px 6px;
    }
    .traj-buttons {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }
    .traj-buttons button {
      font-family: inherit;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid #2a2a4e;
      background: #1a1a2e;
      color: #888;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .traj-buttons button:hover { background: #2a2a4e; color: #ccc; }
    #traj-btn-start { border-color: #2a4e2a; background: #1a2e1a; color: #9f9; }
    #traj-btn-stop  { border-color: #4e2a2a; background: #2e1a1a; color: #f99; }
    #traj-status { font-size: 11px; color: #888; }
    #trajectory-list {
      list-style: none;
      font-size: 10px;
      color: #aaa;
      padding: 4px 6px;
      background: #0f0f1a;
      border: 1px solid #1a1a3e;
      border-radius: 4px;
      min-height: 28px;
      max-height: 80px;
      overflow-y: auto;
    }
    #trajectory-list li { padding: 1px 0; }
  </style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>spatial_engine WebGUI</h1>
  <span id="status-label">connecting…</span>
  <div id="mode-panel">
    <button id="btn-ai-mode">AI 추적</button>
    <button id="btn-lt-mode" class="active">저레이턴시</button>
    <span id="mode-status">모드: low_latency</span>
    <div id="v2s-panel" style="display:inline-flex;align-items:center;gap:6px;margin-left:12px;border-left:1px solid #333;padding-left:12px;">
      <span style="font-size:11px;color:#aaa;">vid2spatial</span>
      <button id="btn-v2s-start">시작</button>
      <button id="btn-v2s-stop" disabled>정지</button>
      <span id="v2s-status" style="font-size:11px;color:#666;">정지됨</span>
    </div>
  </div>
  <div id="scene-panel" style="display:flex;align-items:center;gap:6px;margin-left:12px;">
    <input id="scene-name" type="text" value="default" style="width:90px;font-family:inherit;font-size:11px;padding:3px 6px;background:#1a1a2e;border:1px solid #2a2a4e;border-radius:4px;color:#ccc;" placeholder="씬 이름" />
    <button id="btn-scene-save" style="font-family:inherit;font-size:11px;padding:4px 8px;border-radius:4px;border:1px solid #2a2a4e;background:#1a1a2e;color:#888;cursor:pointer;">저장</button>
    <button id="btn-scene-load" style="font-family:inherit;font-size:11px;padding:4px 8px;border-radius:4px;border:1px solid #2a2a4e;background:#1a1a2e;color:#888;cursor:pointer;">로드</button>
  </div>
  <div id="transport-panel" style="display:flex;align-items:center;gap:6px;margin-left:12px;">
    <button id="btn-transport-play" title="/transport/play" style="font-family:inherit;font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid #2a4e2a;background:#1a2e1a;color:#9f9;cursor:pointer;">▶ Play</button>
    <button id="btn-transport-stop" title="/transport/stop" style="font-family:inherit;font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid #4e2a2a;background:#2e1a1a;color:#f99;cursor:pointer;">■ Stop</button>
  </div>
  <span id="fps-counter" title="Canvas render rate (Phase 1 gate: ≥ 60 fps)" style="margin-left:12px;font-family:inherit;font-size:11px;color:#5cf;background:#1a1a2e;border:1px solid #2a2a4e;border-radius:4px;padding:3px 6px;">— fps</span>
</header>

<main>
  <div class="view-panel" id="topdown-panel">
    <div class="view-label">Top-Down View</div>
    <canvas id="topdown-canvas"></canvas>
  </div>
  <div style="display:flex;flex-direction:column;flex:1;gap:8px;">
    <div class="view-panel" id="elevation-panel" style="flex:1;">
      <div class="view-label">Elevation View</div>
      <canvas id="elevation-canvas"></canvas>
    </div>
    <div id="legend">
      <!-- Populated by JS -->
    </div>
  </div>
  <!-- Trajectory control panel -->
  <section id="trajectory-panel">
    <h2>Trajectory</h2>
    <div class="traj-row">
      <span class="traj-label">Shape</span>
      <select id="traj-shape">
        <option value="circle">Circle</option>
        <option value="line">Line</option>
        <option value="lissajous">Lissajous</option>
      </select>
    </div>
    <div class="traj-row">
      <span class="traj-label">Obj ID</span>
      <input id="traj-obj-id" type="number" min="0" max="63" value="0" style="width:56px;" />
    </div>
    <div class="traj-row">
      <span class="traj-label">Speed (Hz)</span>
      <input id="traj-speed" type="range" min="0.1" max="5.0" step="0.1" value="0.5" />
      <span id="traj-speed-val" class="traj-val">0.50</span>
    </div>
    <div class="traj-row">
      <span class="traj-label">Radius (m)</span>
      <input id="traj-radius" type="range" min="0.1" max="5.0" step="0.1" value="1.0" />
      <span id="traj-radius-val" class="traj-val">1.00</span>
    </div>
    <div class="traj-row">
      <span class="traj-label">Elevation (rad)</span>
      <input id="traj-elevation" type="range" min="-1.5708" max="1.5708" step="0.01" value="0" />
      <span id="traj-elevation-val" class="traj-val">0.000</span>
    </div>
    <div class="traj-buttons">
      <button id="traj-btn-start">▶ Start</button>
      <button id="traj-btn-stop">■ Stop</button>
      <button id="traj-btn-refresh">↺ Refresh</button>
      <span id="traj-status">대기 중</span>
    </div>
    <ul id="trajectory-list"></ul>
  </section>
</main>

<script src="/static/ws_client.js"></script>
<script src="/static/canvas.js"></script>
<script src="/static/trajectory.js"></script>
<script>
  // Status dot reflects WS connection
  const dot = document.getElementById("status-dot");
  const label = document.getElementById("status-label");

  // Build legend
  const legendEl = document.getElementById("legend");
  const GROUP_LABELS = ["G1","G2","G3","G4","G5","G6","G7","G8"];
  const GROUP_COLORS_HTML = [
    "#e74c3c","#e67e22","#f1c40f","#2ecc71",
    "#1abc9c","#3498db","#9b59b6","#e91e63",
  ];
  GROUP_LABELS.forEach((lbl, i) => {
    const item = document.createElement("div");
    item.className = "legend-item";
    // Object IDs are 0-based (0..63) — group i covers i*8 .. i*8+7.
    item.innerHTML = `<span class="legend-dot" style="background:${GROUP_COLORS_HTML[i]}"></span>${lbl} (${i*8}-${i*8+7})`;
    legendEl.appendChild(item);
  });

  // Update status dot based on WS state by monkey-patching WsClient.onMessage
  // Note: WsClient already parses JSON; data is an object here.
  WsClient.onMessage((data) => {
    dot.classList.add("connected");
    label.textContent = "connected";
    // Handle mode_change broadcast from server
    if (data && data.type === "mode_change") {
      _applyMode(data.mode);
    } else if (data && data.type === "v2s_status") {
      _v2sSetRunning(data.running);
    } else if (data && data.type === "drag_suppressed") {
      // ADR 0013/0015: server dropped a positional send because AI mode
      // owns the 9100 wire. Surface it — otherwise the canvas dot moved
      // but the audio object did not.
      _flashModeStatus("AI 모드: 드래그 차단됨 — 저레이턴시로 전환하세요");
    }
  });

  let _modeFlashTimer = null;
  function _flashModeStatus(text) {
    modeStatus.textContent = text;
    modeStatus.style.color = "#e74c3c";
    if (_modeFlashTimer) clearTimeout(_modeFlashTimer);
    _modeFlashTimer = setTimeout(() => {
      modeStatus.style.color = "#666";
      modeStatus.textContent = "모드: " + (btnAi.classList.contains("active") ? "ai" : "low_latency");
    }, 2500);
  }

  // --- Mode toggle ---
  const btnAi = document.getElementById("btn-ai-mode");
  const btnLt = document.getElementById("btn-lt-mode");
  const modeStatus = document.getElementById("mode-status");

  function _applyMode(mode) {
    modeStatus.textContent = "모드: " + mode;
    if (mode === "ai") {
      btnAi.classList.add("active");
      btnLt.classList.remove("active");
    } else {
      btnLt.classList.add("active");
      btnAi.classList.remove("active");
    }
  }

  async function _setMode(mode) {
    try {
      const res = await fetch("/api/mode?mode=" + encodeURIComponent(mode), { method: "POST" });
      if (res.ok) {
        const json = await res.json();
        _applyMode(json.mode);
      }
    } catch (err) {
      console.error("[mode] request failed:", err);
    }
  }

  btnAi.addEventListener("click", () => _setMode("ai"));
  btnLt.addEventListener("click", () => _setMode("low_latency"));

  // Fetch initial mode on load
  fetch("/api/mode").then(r => r.json()).then(j => _applyMode(j.mode)).catch(() => {});

  // vid2spatial bridge controls
  const btnV2sStart = document.getElementById("btn-v2s-start");
  const btnV2sStop  = document.getElementById("btn-v2s-stop");
  const v2sStatus   = document.getElementById("v2s-status");

  async function _v2sSetRunning(running) {
    v2sStatus.textContent = running ? "실행 중 (:9000)" : "정지됨";
    v2sStatus.style.color = running ? "#4caf50" : "#666";
    btnV2sStart.disabled = running;
    btnV2sStop.disabled  = !running;
  }

  btnV2sStart.addEventListener("click", async () => {
    try {
      const r = await fetch("/api/vid2spatial/start", { method: "POST" });
      const j = await r.json();
      _v2sSetRunning(j.running);
    } catch(e) { console.error("[v2s] start failed:", e); }
  });

  btnV2sStop.addEventListener("click", async () => {
    try {
      const r = await fetch("/api/vid2spatial/stop", { method: "POST" });
      const j = await r.json();
      _v2sSetRunning(j.running);
    } catch(e) { console.error("[v2s] stop failed:", e); }
  });

  // Poll initial status
  fetch("/api/vid2spatial/status").then(r => r.json()).then(j => _v2sSetRunning(j.running)).catch(()=>{});

  // --- Scene save/load ---
  document.getElementById("btn-scene-save").addEventListener("click", () => {
    const name = document.getElementById("scene-name").value.trim() || "default";
    WsClient.send({ type: "scene_save", name });
  });
  document.getElementById("btn-scene-load").addEventListener("click", () => {
    const name = document.getElementById("scene-name").value.trim() || "default";
    WsClient.send({ type: "scene_load", name });
  });

  // --- Transport (P-D) ---
  document.getElementById("btn-transport-play").addEventListener("click", () => {
    WsClient.send({ type: "transport", action: "play" });
  });
  document.getElementById("btn-transport-stop").addEventListener("click", () => {
    WsClient.send({ type: "transport", action: "stop" });
  });
</script>
</body>
</html>
