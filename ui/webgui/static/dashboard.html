<!DOCTYPE html>
<!--
  spatial_engine — Real-time Metrics Dashboard (v0.9 Lane A · A-M4).

  DD-C LOCKED: self-hosted canvas minicharts, ZERO external JS / CDN. Loads
  only /static/js/minichart.js + /static/js/dashboard.js. Telemetry arrives on
  the /ws/metrics channel (A-M3).
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>spatial_engine — Metrics Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: #ccc;
      font-family: "SF Mono", "Fira Code", monospace;
      min-height: 100dvh;
      padding: 12px;
    }

    /* §1 — top engine status bar */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: #16162a;
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    header h1 { font-size: 14px; font-weight: 600; color: #a0a0cc; }
    #conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #e74c3c; transition: background 0.3s;
    }
    #conn-dot.connected { background: #2ecc71; }
    #conn-label { font-size: 11px; color: #666; }
    .stat-group { display: flex; gap: 14px; margin-left: auto; }
    .stat { display: flex; flex-direction: column; align-items: flex-end; }
    .stat .k {
      font-size: 9px; color: #555; text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat .v { font-size: 14px; color: #aef; }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
    }
    .panel {
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .panel h2 {
      font-size: 11px; color: #a0a0cc; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    canvas.chart {
      display: block;
      width: 100%;
      height: 140px;
      background: #0f0f1a;
      border: 1px solid #1f1f3a;
      border-radius: 4px;
    }
    .chart-row { margin-bottom: 12px; }
    .chart-row:last-child { margin-bottom: 0; }
    .chart-label { font-size: 10px; color: #777; margin-bottom: 4px; }

    /* §3 — binaural panel */
    #binaural-demote {
      display: inline-block;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 4px;
      background: #1a2e1a;
      color: #9f9;
      border: 1px solid #2a4e2a;
    }
    #binaural-demote.demoted {
      background: #2e1a1a; color: #f99; border-color: #4e2a2a;
    }
    #btn-reset-demote {
      font-family: inherit; font-size: 11px;
      margin-left: 10px; padding: 4px 12px;
      border-radius: 4px; border: 1px solid #2a2a4e;
      background: #1a1a2e; color: #aaa; cursor: pointer;
    }
    #btn-reset-demote:hover { background: #2a2a4e; color: #ccc; }

    /* §4 — warning log */
    #warning-log {
      list-style: none;
      font-size: 10px; color: #cba;
      max-height: 220px; overflow-y: auto;
      background: #0f0f1a; border: 1px solid #1f1f3a; border-radius: 4px;
      padding: 6px 8px;
    }
    #warning-log li { padding: 1px 0; border-bottom: 1px solid #15152a; }

    /* §5 — object activity */
    #object-activity {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 3px;
    }
    .obj-cell {
      height: 14px; border-radius: 2px;
      background: #15152a; border: 1px solid #1f1f3a;
    }
    .obj-cell.active { background: #2ecc71; }
  </style>
</head>
<body>

  <!-- §1 — Engine status bar -->
  <header>
    <div id="conn-dot"></div>
    <h1>spatial_engine metrics</h1>
    <span id="conn-label">connecting…</span>
    <div class="stat-group">
      <div class="stat"><span class="k">CPU</span><span class="v" id="stat-cpu">— %</span></div>
      <div class="stat"><span class="k">Peak</span><span class="v" id="stat-cpu-peak">— %</span></div>
      <div class="stat"><span class="k">p99</span><span class="v" id="stat-p99">— µs</span></div>
      <div class="stat"><span class="k">xrun</span><span class="v" id="stat-xrun">—</span></div>
      <div class="stat"><span class="k">overrun</span><span class="v" id="stat-overrun">—</span></div>
    </div>
  </header>

  <div class="grid">
    <!-- §2 — CPU / xrun / p99 charts -->
    <section class="panel">
      <h2>Performance (60 s)</h2>
      <div class="chart-row">
        <div class="chart-label">CPU avg / peak (%)</div>
        <canvas id="chart-cpu" class="chart" width="640" height="140"></canvas>
      </div>
      <div class="chart-row">
        <div class="chart-label">xrun Δ (per tick)</div>
        <canvas id="chart-xrun" class="chart" width="640" height="120"></canvas>
      </div>
      <div class="chart-row">
        <div class="chart-label">p99 block time (µs)</div>
        <canvas id="chart-p99" class="chart" width="640" height="120"></canvas>
      </div>
    </section>

    <div style="display:flex;flex-direction:column;gap:10px;">
      <!-- §3 — Binaural panel -->
      <section class="panel">
        <h2>Binaural</h2>
        <div>
          <span id="binaural-demote">nominal</span>
          <button id="btn-reset-demote" title="/sys/binaural_reset_demote (wired in A-M5)">reset demote</button>
        </div>
      </section>

      <!-- §4 — Warning log (last 50) -->
      <section class="panel">
        <h2>Warnings (last 50)</h2>
        <ul id="warning-log"></ul>
      </section>

      <!-- §5 — Object activity -->
      <section class="panel">
        <h2>Object activity</h2>
        <div id="object-activity"></div>
      </section>
    </div>
  </div>

  <script src="/static/js/minichart.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script>
    // §5 — render a 64-cell object-activity grid placeholder. Live activity
    // wiring is future scope; the DOM scaffold ships here per plan A.1 §5.
    (() => {
      const grid = document.getElementById("object-activity");
      if (!grid) return;
      for (let i = 0; i < 64; i++) {
        const cell = document.createElement("div");
        cell.className = "obj-cell";
        cell.title = "obj " + i;
        cell.dataset.obj = String(i);
        grid.appendChild(cell);
      }
    })();
  </script>
</body>
</html>
