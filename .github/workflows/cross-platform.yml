name: Cross-platform core build + ctest
# v0.6 P2 — extends CI beyond ubuntu-24.04 x86_64 to cover Apple Silicon
# (macos-14, arm64) and Linux ARM (ubuntu-24.04-arm). Targets the v0.5
# SSE-guard + v0.6 #9 release-store weak-memory-order corner-case fix
# that previously had zero regression gate on those architectures.
#
# Scope intentionally narrower than vst3.yml:
#   - Builds the NO_JUCE core only (no VST3 — Steinberg SDK cross-platform
#     setup is a separate work item, P3).
#   - Runs the full ctest suite (the same 86+ tests as Linux x86_64).
#   - Does NOT participate in the off-byte-identical baseline (different
#     toolchains → different bytes by design).
#   - pytest is run only on the same job for the macOS lane since the
#     soak/asyncio harness has platform-specific timing assumptions.
#
# Failure of a matrix leg does NOT block merge in the v0.6 cycle; this
# workflow runs as a *signal*. After the first stable green run on each
# leg we will promote it to required via branch protection (v0.6.x or v0.7
# admin task — tracked in docs/weekly_progress_report_2026-05-18.md §5
# P2-1).

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'CMakeLists.txt'
      - 'scripts/bootstrap_*.sh'
      - '.github/workflows/cross-platform.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'CMakeLists.txt'
      - 'scripts/bootstrap_*.sh'
      - '.github/workflows/cross-platform.yml'
  workflow_dispatch: {}

jobs:
  core-cross-platform:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: true   # v0.6 cycle: signal-only, not gating.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-arm64
            arch: aarch64
            runner: ubuntu-24.04-arm
            cmake_jobs_cmd: nproc
          - os: macos-arm64
            arch: arm64
            runner: macos-14
            cmake_jobs_cmd: sysctl -n hw.ncpu

    steps:
      - uses: actions/checkout@v4

      - name: Print toolchain info
        run: |
          uname -a
          cmake --version
          if [ "$RUNNER_OS" = "macOS" ]; then
            xcode-select -p
            clang --version
          else
            gcc --version || true
            clang --version || true
          fi

      - name: Install cmake (macOS via brew)
        if: runner.os == 'macOS'
        run: |
          brew update --quiet
          brew install --quiet cmake

      - name: Install build deps (Linux ARM)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config python3.11 python3-pip

      - name: Configure NO_JUCE core
        run: |
          cmake -B build_core -S . \
            -DSPATIAL_ENGINE_NO_JUCE=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build core
        run: |
          cmake --build build_core -j$(${{ matrix.cmake_jobs_cmd }})

      - name: SSE-guard sanity (v0.5 — no unguarded _mm_ outside x86_64)
        if: matrix.arch != 'x86_64'
        run: |
          # On non-x86 the build above already exercised the guard. This
          # is a belt-and-suspenders check that the source tree has no
          # ungated _mm_* calls that snuck past per-arch compile units.
          # We allow _mm_ inside `#if defined(__x86_64__)` and the SSE
          # detection block (`SPE_HAS_SSE`).
          n=$(grep -rn "_mm_" core/src/ 2>/dev/null \
              | grep -v "__x86_64__" \
              | grep -v "SPE_HAS_SSE" \
              | grep -v "//" \
              | wc -l | tr -d ' ')
          echo "Unguarded _mm_ call hits: $n"
          test "$n" = "0" \
            || (grep -rn "_mm_" core/src/ | grep -v "__x86_64__" | grep -v "SPE_HAS_SSE" | grep -v "//"; exit 1)

      - name: ctest (full core suite)
        run: |
          cd build_core
          ctest --output-on-failure -j$(${{ matrix.cmake_jobs_cmd }})

      - name: Capture ctest log on failure
        if: failure()
        run: |
          if [ -f build_core/Testing/Temporary/LastTest.log ]; then
            echo "=== LastTest.log (tail 200) ==="
            tail -200 build_core/Testing/Temporary/LastTest.log
          fi

      - name: Smoke wav-capture (v0.6 #9 release-store smoke on non-x86)
        if: matrix.arch != 'x86_64'
        run: |
          # 2-second wav-capture run. Forces the outbound OSC ring through
          # at least 2 wrap cycles at 1 Hz heartbeat, exercising the v0.6
          # #9 release-store on a non-x86 architecture. Failure of this
          # step is meaningful — passing is not proof of weak-order
          # correctness but absence of crash is necessary.
          if [ -x build_core/core/spatial_engine_core ]; then
            timeout 5 build_core/core/spatial_engine_core \
              --osc-port 0 \
              --wav /tmp/v06_smoke.wav \
              --seconds 2 \
              || echo "smoke exited non-zero (acceptable for headless wav-capture)"
            ls -la /tmp/v06_smoke.wav || echo "no wav generated"
          else
            echo "spatial_engine_core not built at expected path; skipping smoke"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-platform-${{ matrix.os }}-${{ github.sha }}
          path: |
            build_core/Testing/Temporary/LastTest.log
            /tmp/v06_smoke.wav
          if-no-files-found: ignore
          retention-days: 14
