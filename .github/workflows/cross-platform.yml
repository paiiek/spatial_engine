name: Cross-platform core build + ctest
# v0.6 P2 — extends CI beyond ubuntu-24.04 x86_64 to cover Apple Silicon
# (macos-14, arm64) and Linux ARM (ubuntu-24.04-arm). Targets the v0.5
# SSE-guard + v0.6 #9 release-store weak-memory-order corner-case fix
# that previously had zero regression gate on those architectures.
#
# Scope intentionally narrower than vst3.yml:
#   - Builds the NO_JUCE core only (no VST3 — Steinberg SDK cross-platform
#     setup is a separate work item, P3).
#   - Runs the full ctest suite (the same 86+ tests as Linux x86_64).
#   - Does NOT participate in the off-byte-identical baseline (different
#     toolchains → different bytes by design).
#   - pytest is run only on the same job for the macOS lane since the
#     soak/asyncio harness has platform-specific timing assumptions.
#
# v0.7 promotion status:
#   - linux-arm64: REQUIRED gate as of v0.7 (D-S5). ARM64 failure BLOCKS merge.
#     See docs/ci-promotion-history.md for 5-green soak gate and promotion log.
#     See docs/release/v0.7.0/cross-platform-gating.md for click-path + rollback.
#   - macos-14 (Apple Silicon): signal-only per AS-6. Named owner: paiiek.
#     Hardware-handoff scoped to v0.8 after checklist sign-off.
#
# AS-4 rollback procedure: if ARM64 leg flakes >2 consecutive runs after
# promotion, revert the continue-on-error change via git revert + open a
# Linear ticket for triage. Do NOT bypass via [skip ci] — that masks systemic
# issues. Rollback options:
#   Option-A (preferred): repo admin uses GitHub "Merge without waiting for
#     requirements" bypass. Audit log entry mandatory; admin must comment issue link.
#   Option-B (fallback): repo admin temporarily removes linux-arm64 from required
#     status checks, merges the revert PR, re-adds linux-arm64. Gap window must
#     be <15 minutes; document in weekly_progress_report §5.3.
#   Re-promotion after fix: requires fresh 5-green soak before re-flipping
#     continue-on-error. Same rule as initial promotion.

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'CMakeLists.txt'
      - 'scripts/bootstrap_*.sh'
      - '.github/workflows/cross-platform.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'CMakeLists.txt'
      - 'scripts/bootstrap_*.sh'
      - '.github/workflows/cross-platform.yml'
  workflow_dispatch: {}

jobs:
  # v0.7 D-S5 — Linux ARM64 promoted to REQUIRED per plan ratification
  # (Architect §A.4 + Critic §C.4 promotion order). 5-consecutive-green soak
  # required before merging this promotion. After merge: ARM64 failure BLOCKS merge.
  # TODO(repo-admin): mark 'core-linux-arm64 (linux-arm64 / aarch64)' as a
  # required status check in Settings → Branches → branch protection rules.
  core-linux-arm64:
    name: linux-arm64 (aarch64)
    runs-on: ubuntu-24.04-arm
    # continue-on-error intentionally absent — this job is REQUIRED in v0.7.
    # See AS-4 rollback procedure in file header above.
    steps:
      - uses: actions/checkout@v4

      - name: Print toolchain info
        run: |
          uname -a
          cmake --version
          gcc --version || true
          clang --version || true

      - name: Install build deps (Linux ARM)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config python3.11 python3-pip

      - name: Configure NO_JUCE core
        run: |
          cmake -B build_core -S . \
            -DSPATIAL_ENGINE_NO_JUCE=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build core
        run: |
          cmake --build build_core -j$(nproc)

      - name: SSE-guard sanity (v0.5 — no unguarded _mm_ outside x86_64)
        run: |
          n=$(grep -rn "_mm_" core/src/ 2>/dev/null \
              | grep -v "__x86_64__" \
              | grep -v "SPE_HAS_SSE" \
              | grep -v "//" \
              | wc -l | tr -d ' ')
          echo "Unguarded _mm_ call hits: $n"
          test "$n" = "0" \
            || (grep -rn "_mm_" core/src/ | grep -v "__x86_64__" | grep -v "SPE_HAS_SSE" | grep -v "//"; exit 1)

      - name: ctest (full core suite)
        run: |
          cd build_core
          ctest --output-on-failure -j$(nproc)

      - name: Capture ctest log on failure
        if: failure()
        run: |
          if [ -f build_core/Testing/Temporary/LastTest.log ]; then
            echo "=== LastTest.log (tail 200) ==="
            tail -200 build_core/Testing/Temporary/LastTest.log
          fi

      - name: Smoke wav-capture (v0.6 #9 release-store smoke on non-x86)
        run: |
          if [ -x build_core/core/spatial_engine_core ]; then
            timeout 5 build_core/core/spatial_engine_core \
              --osc-port 0 \
              --wav /tmp/v06_smoke.wav \
              --seconds 2 \
              || echo "smoke exited non-zero (acceptable for headless wav-capture)"
            ls -la /tmp/v06_smoke.wav || echo "no wav generated"
          else
            echo "spatial_engine_core not built at expected path; skipping smoke"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-platform-linux-arm64-${{ github.sha }}
          path: |
            build_core/Testing/Temporary/LastTest.log
            /tmp/v06_smoke.wav
          if-no-files-found: ignore
          retention-days: 14

  # v0.7 AS-6 — macOS-14 (Apple Silicon) remains signal-only.
  # Named owner: paiiek. Hardware-handoff (physical Apple Silicon Mac access
  # for triage) scoped to v0.8 per AS-6 deferral. Promotion requires:
  #   1. 1 full cycle of green builds after v0.7 ship.
  #   2. macos-arm64-verify.md checklist sign-off by paiiek.
  #   3. Fresh 5-green soak per §7.1 Scenario C pre-mortem criteria.
  core-macos-arm64:
    name: macos-arm64 (arm64)
    runs-on: macos-14
    continue-on-error: true   # v0.7 AS-6: signal-only. Named owner: paiiek. Promote in v0.8.
    steps:
      - uses: actions/checkout@v4

      - name: Print toolchain info
        run: |
          uname -a
          cmake --version
          xcode-select -p
          clang --version

      - name: Install cmake (macOS via brew)
        run: |
          brew update --quiet
          brew install --quiet cmake

      - name: Configure NO_JUCE core
        run: |
          cmake -B build_core -S . \
            -DSPATIAL_ENGINE_NO_JUCE=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build core
        run: |
          cmake --build build_core -j$(sysctl -n hw.ncpu)

      - name: SSE-guard sanity (v0.5 — no unguarded _mm_ outside x86_64)
        run: |
          n=$(grep -rn "_mm_" core/src/ 2>/dev/null \
              | grep -v "__x86_64__" \
              | grep -v "SPE_HAS_SSE" \
              | grep -v "//" \
              | wc -l | tr -d ' ')
          echo "Unguarded _mm_ call hits: $n"
          test "$n" = "0" \
            || (grep -rn "_mm_" core/src/ | grep -v "__x86_64__" | grep -v "SPE_HAS_SSE" | grep -v "//"; exit 1)

      - name: ctest (full core suite)
        run: |
          cd build_core
          ctest --output-on-failure -j$(sysctl -n hw.ncpu)

      - name: Capture ctest log on failure
        if: failure()
        run: |
          if [ -f build_core/Testing/Temporary/LastTest.log ]; then
            echo "=== LastTest.log (tail 200) ==="
            tail -200 build_core/Testing/Temporary/LastTest.log
          fi

      - name: Smoke wav-capture (v0.6 #9 release-store smoke on non-x86)
        run: |
          if [ -x build_core/core/spatial_engine_core ]; then
            timeout 5 build_core/core/spatial_engine_core \
              --osc-port 0 \
              --wav /tmp/v06_smoke.wav \
              --seconds 2 \
              || echo "smoke exited non-zero (acceptable for headless wav-capture)"
            ls -la /tmp/v06_smoke.wav || echo "no wav generated"
          else
            echo "spatial_engine_core not built at expected path; skipping smoke"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-platform-macos-arm64-${{ github.sha }}
          path: |
            build_core/Testing/Temporary/LastTest.log
            /tmp/v06_smoke.wav
          if-no-files-found: ignore
          retention-days: 14
