name: VST3 build + B.2 host fixture
# Phase C C2 v4 Option B — JUCE-free vst3sdk hand-roll.
# pluginval은 M2 strictness 게이트에서 폐기 (B.2 채택, plan §6 Step 4.1):
# in-process host fixture (test_vst3_host_fixture) + 6 ctest 가 vstvalidator
# 등가 검증 항목을 자체 정의. Driver #1 (sysdep-free) 보호를 위해 JUCE plugin
# client / X11 / freetype / alsa transitive dep 0 게이트도 추가.
on:
  push:
    branches: [main]
    paths:
      - 'vst3/**'
      - 'core/**'
      - 'scripts/bootstrap_*.sh'
      - '.github/workflows/vst3.yml'
      - '.ci/**'
      - 'CMakeLists.txt'
  pull_request:
    paths:
      - 'vst3/**'
      - 'core/**'
      - 'scripts/bootstrap_*.sh'
      - '.github/workflows/vst3.yml'
      - '.ci/**'
      - 'CMakeLists.txt'

jobs:
  vst3-build-and-host-fixture:
    # ubuntu-24.04 = baseline 생성 host 와 동일 (GCC 13.3.0 / GLIBC 2.39).
    # §15.B byte-gate pinning: baseline 은 OFF job 에서만 검증.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Cache JUCE (vst3sdk vendored tree only — no juce_audio_plugin_client link)
        uses: actions/cache@v4
        with:
          path: core/JUCE
          key: juce-7.0.12-bundled-vst3sdk-${{ hashFiles('scripts/bootstrap_juce.sh') }}
      - name: Bootstrap JUCE (vst3sdk vendored tree only)
        run: bash scripts/bootstrap_juce.sh
      - name: Verify vst3sdk SHA pin (AM-8 시나리오 5)
        run: |
          actual=$( cd core/JUCE && git ls-tree -r HEAD modules/juce_audio_processors/format_types/VST3_SDK | sha256sum)
          expected=$(grep -E '^[0-9a-f]{64}' .ci/vst3sdk_sha.txt | tail -n1)
          echo "actual:   $actual"
          echo "expected: $expected"
          test "$(echo "$actual" | awk '{print $1}')" = "$(echo "$expected" | awk '{print $1}')" \
            || (echo "vst3sdk SHA pin mismatch"; exit 1)
      - name: Build VST3 (Option B — JUCE-free auto-forced by SPATIAL_ENGINE_VST3=ON)
        run: |
          cmake -B build_vst3_on -DSPATIAL_ENGINE_VST3=ON
          cmake --build build_vst3_on -j$(nproc)
      - name: Sysdep-free gate (Driver #1 보호)
        run: |
          ldd build_vst3_on/vst3/spatial_engine_vst3.so > /tmp/ldd.out
          n=$(grep -cE 'libX11|libfreetype|libasound|libwebkit' /tmp/ldd.out || true)
          test "$n" = "0" \
            || (cat /tmp/ldd.out; echo "sysdep transitive present (got $n)"; exit 1)
      - name: Run M2 B.2 host fixture + 6 ctest (94+ assertion)
        run: |
          cd build_vst3_on
          ctest --output-on-failure -R "vst3_"
      - name: Runtime sysdep gate (LD_DEBUG=libs, S4 Driver #1 belt-and-suspenders)
        run: |
          cd build_vst3_on
          LD_DEBUG=libs ./vst3/tests/test_vst3_host_fixture 2>&1             | tee /tmp/ld_debug.out             | grep -cE 'libX11|libfreetype|libasound|libwebkit' > /tmp/sysdep_count.txt             || echo 0 > /tmp/sysdep_count.txt
          n=$(cat /tmp/sysdep_count.txt)
          echo "sysdep transitive runtime hits: $n"
          test "$n" = "0"             || (echo "RUNTIME sysdep loaded — see /tmp/ld_debug.out"; head -50 /tmp/ld_debug.out; exit 1)

  off-byte-identical:
    # baseline 은 GHA ubuntu-24.04 runner image 호스트에 pin (run #4 의 sha256).
    # GHA image 가 GCC patch / binutils 등을 bump 하면 baseline 재pin 필요 —
    # 'off-hashes-<sha>' artifact 에 매 run 의 candidate hash 가 30 day 보존됨.
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - name: Build OFF baseline
        run: |
          cmake -B build_off -DSPATIAL_ENGINE_VST3=OFF -DSPATIAL_ENGINE_NO_JUCE=ON
          cmake --build build_off --target spe_core spatial_engine_core -j$(nproc)
      - name: Compute OFF hashes (bytes + symbols)
        if: always()
        run: |
          sha256sum build_off/core/libspe_core.a build_off/core/spatial_engine_core \
            | sed 's|build_off/||g' > /tmp/off.bytes.sha256
          (nm --defined-only --extern-only build_off/core/libspe_core.a \
            | awk '{print $2" "$3}' | LC_ALL=C sort -u | sha256sum
           nm --defined-only build_off/core/spatial_engine_core \
            | awk '{print $2" "$3}' | LC_ALL=C sort -u | sha256sum) > /tmp/off.symbols.sha256
          echo "=== /tmp/off.bytes.sha256 ===";  cat /tmp/off.bytes.sha256
          echo "=== /tmp/off.symbols.sha256 ==="; cat /tmp/off.symbols.sha256
          echo "### OFF candidate hashes ($(git rev-parse --short HEAD))" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "# bytes:" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/off.bytes.sha256 >> "$GITHUB_STEP_SUMMARY"
          echo "# symbols:" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/off.symbols.sha256 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload OFF hashes (for baseline re-pin if drift)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: off-hashes-${{ github.sha }}
          path: |
            /tmp/off.bytes.sha256
            /tmp/off.symbols.sha256
          retention-days: 30
      - name: Verify byte-level (primary, pinned host)
        run: |
          diff /tmp/off.bytes.sha256 .ci/off_baseline.bytes.sha256 \
            || (echo "BYTE baseline mismatch — see uploaded artifact 'off-hashes-${GITHUB_SHA}'"; exit 1)
      - name: Verify symbol-level (secondary, cross-toolchain)
        if: always()
        run: |
          diff /tmp/off.symbols.sha256 .ci/off_baseline.symbols.sha256 \
            || (echo "SYMBOL baseline mismatch — see uploaded artifact 'off-hashes-${GITHUB_SHA}'"; exit 1)
